name: ci

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

env:
  CI: true
  TZ: Asia/Tokyo
  DO_NOT_TRACK: 1

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/setup@v1
      - run: pnpm --version
      - run: node --version
      - run: pnpm run typecheck
      - run: pnpm run fmt
      - run: pnpm run lint
      - run: pnpm run test
